name: CI/CD Pipeline - n11 Backend Project

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Common-Lib
        run: |
          cd common-lib
          mvn clean install -DskipTests

      - name: Build and Push Microservices
        run: |
          for dir in discovery-server api-gateway config-server log-service notification-service order-service payment-service product-service shopping-cart-service stock-service user-service; do
            echo "--- Building and Pushing $dir ---"
            cd $dir
            mvn compile jib:build -DskipTests
            cd ..
          done

  deploy:
    name: Deploy to GCP
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands on GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker system prune -f

  notify:
    name: Send Discord Notification
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: '🚀 n11 Bootcamp Projesi Deploy İşlemi Tamamlandı! Durum: ${{ needs.deploy.result }}'